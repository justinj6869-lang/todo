<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1d9e75" />
<title>To-Do</title>
<style>
  :root{
    --bg:#f7f6f2; --card:#ffffff; --ink:#23221f; --muted:#76746c; --line:#e7e5dd;
    --accent:#1d9e75; --accent-bg:#e1f5ee; --done:#9a988f;
    --sched:#ba7517; --sched-bg:#faeeda; --danger:#a32d2d;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1b1b19; --card:#242421; --ink:#ecebe4; --muted:#a3a199; --line:#34332e;
      --accent:#5dcaa5; --accent-bg:#0f3a2f; --done:#6f6e68; --sched:#ef9f27; --sched-bg:#3a2a0e; --danger:#f09595; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;padding:24px 16px;-webkit-text-size-adjust:100%;}
  .wrap{max-width:640px;margin:0 auto;}
  .back{display:inline-block;font-size:13px;color:var(--muted);text-decoration:none;margin-bottom:10px;}
  .back:hover{color:var(--accent);}
  h1{font-size:22px;font-weight:600;margin:0 0 2px;}
  .sub{color:var(--muted);font-size:13px;margin:0 0 14px;}
  .status{font-size:12px;margin:0 0 12px;display:flex;align-items:center;gap:7px;min-height:18px;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex:0 0 9px;}
  .status.ok .dot{background:var(--accent);} .status.saving .dot{background:var(--sched);}
  .status.err{color:var(--danger);} .status.err .dot{background:var(--danger);}
  .bar{height:10px;background:var(--line);border-radius:99px;overflow:hidden;margin:6px 0 4px;}
  .bar>span{display:block;height:100%;background:var(--accent);width:0;transition:width .25s ease;}
  .count{font-size:13px;color:var(--muted);margin-bottom:16px;}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .toolbar button{font:inherit;font-size:13px;padding:6px 12px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);border-radius:8px;cursor:pointer;}
  .toolbar button:hover{border-color:var(--accent);}
  .toolbar button:disabled{opacity:.45;cursor:default;}
  section{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:6px 16px 10px;margin-bottom:14px;}
  h2{font-size:14px;font-weight:600;margin:14px 0 6px;display:flex;align-items:center;gap:8px;}
  h2 .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;
    background:var(--accent-bg);color:var(--accent);}
  h2.sched .pill{background:var(--sched-bg);color:var(--sched);}
  h2.pri{color:var(--sched);} h2.pri .pill{background:var(--sched-bg);color:var(--sched);}
  section.pri{border-color:var(--sched);}
  ul{list-style:none;margin:0;padding:0;}
  ul.drop-empty{min-height:38px;}
  li{display:flex;align-items:flex-start;gap:10px;padding:11px 2px;border-top:1px solid var(--line);
    cursor:pointer;-webkit-tap-highlight-color:transparent;background:var(--card);}
  li:first-child{border-top:none;}
  .grip{flex:0 0 auto;color:var(--muted);font-size:15px;line-height:22px;cursor:grab;
    touch-action:none;user-select:none;-webkit-user-select:none;margin-top:1px;padding:0 1px;}
  .grip:active{cursor:grabbing;}
  .box{flex:0 0 22px;width:22px;height:22px;border:2px solid var(--muted);border-radius:6px;
    margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:.15s;}
  li.done .box{background:var(--accent);border-color:var(--accent);}
  li.done .box::after{content:"\2713";}
  .txt{flex:1;font-size:15px;}
  li.done .txt{color:var(--done);text-decoration:line-through;}
  .note{display:block;font-size:12px;color:var(--muted);margin-top:2px;text-decoration:none!important;}
  .hide-done li.done{display:none;}
  .empty{color:var(--muted);font-size:14px;padding:20px 2px;}
  .hint{color:var(--muted);font-size:13px;font-style:italic;padding:4px 2px;margin:0;}
  .addbox{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .addbox input{flex:1;min-width:150px;font:inherit;font-size:15px;padding:9px 12px;
    border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);}
  .addbox select{font:inherit;font-size:13px;padding:0 8px;border:1px solid var(--line);
    border-radius:8px;background:var(--card);color:var(--ink);max-width:170px;}
  .addbox button{font:inherit;font-size:14px;font-weight:600;padding:9px 16px;border:none;
    border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;}
  .addbox input:focus,.addbox select:focus{outline:none;border-color:var(--accent);}
  .sortable-ghost{opacity:.35;}
  .sortable-chosen{background:var(--accent-bg);}
  .sortable-drag{opacity:.9;}
  footer{color:var(--muted);font-size:12px;margin-top:18px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">&larr; All lists</a>
  <h1 id="title">To-do</h1>
  <p class="sub" id="subtitle"></p>
  <div class="status" id="status"><span class="dot"></span><span id="statusText">Loading&hellip;</span></div>
  <div class="bar"><span id="fill"></span></div>
  <p class="count" id="count"></p>
  <div class="toolbar">
    <button id="undo" disabled>Undo</button>
    <button id="toggleHide">Hide completed</button>
    <button id="refresh">Refresh</button>
  </div>
  <form class="addbox" id="addForm" autocomplete="off">
    <input id="addText" type="text" placeholder="Add a to-do&hellip;" />
    <select id="addSection" aria-label="Section"></select>
    <button type="submit">Add</button>
  </form>
  <div id="list"></div>
  <footer>Synced live with Supabase &middot; drag the &#9783; handle to reorder &middot; &#8984;Z to undo</footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<script>
const SUPA="https://tuxfqgdsjjczkdwkekfy.supabase.co";
const KEY="sb_publishable_0WSFtp3KLg1wixOtSZlwVQ_dVF0Ychr";
const REST=SUPA+"/rest/v1/todo_items";
const H={apikey:KEY,Authorization:"Bearer "+KEY};
const SCHEDS=["Scheduled / upcoming","Key dates"];
const PRIORITY="High priority";
const LIST=new URLSearchParams(location.search).get("list")||"";
let items=[], busy=0, dragging=false, sortables=[];
const undoStack=[];
const $=id=>document.getElementById(id);
function status(kind,msg){ const el=$("status"); el.className="status "+kind; $("statusText").textContent=msg; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function setUndo(){ $("undo").disabled=undoStack.length===0; }
function pushUndo(a){ undoStack.push(a); if(undoStack.length>40) undoStack.shift(); setUndo(); }

async function loadMeta(){
  try{
    const r=await fetch(SUPA+"/rest/v1/todo_lists?slug=eq."+encodeURIComponent(LIST)+"&select=title,subtitle",{headers:H,cache:"no-store"});
    const rows=await r.json();
    if(rows&&rows[0]){ document.title=rows[0].title; $("title").textContent=rows[0].title;
      $("subtitle").textContent=(rows[0].subtitle||"")+" · tap to check off, drag &#9783; to reorder"; }
  }catch(e){}
}
async function load(){
  if(!LIST){ status("err","No list specified. Go back to All lists."); return; }
  if(busy||dragging) return;
  try{
    const r=await fetch(REST+"?list=eq."+encodeURIComponent(LIST)+"&select=*&order=position.asc",{headers:H,cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    items=await r.json();
    if(!busy) status("ok","Synced");
    render();
  }catch(e){
    status("err","Can't reach the list — "+e.message);
  }
}

// --- ordering helpers ---
function orderedSections(){            // for rendering: High priority pinned first, always present
  const seen=[]; items.forEach(i=>{ if(seen.indexOf(i.section)<0) seen.push(i.section); });
  const rest=seen.filter(s=>s!==PRIORITY);
  return [PRIORITY, ...rest];
}
function addSectionOptions(){          // for the add dropdown: real sections first, priority last
  const seen=[]; items.forEach(i=>{ if(seen.indexOf(i.section)<0) seen.push(i.section); });
  let rest=seen.filter(s=>s!==PRIORITY);
  if(!rest.length) rest=["Inbox"];
  return [...rest, PRIORITY];
}
function populateSections(){
  const sel=$("addSection"); if(!sel) return; const cur=sel.value;
  const secs=addSectionOptions();
  sel.innerHTML=secs.map(s=>'<option value="'+esc(s)+'">'+(s===PRIORITY?'⭐ '+esc(s):esc(s))+'</option>').join("");
  if(cur && secs.indexOf(cur)>=0) sel.value=cur;
}

function destroySortables(){ sortables.forEach(s=>{try{s.destroy();}catch(e){}}); sortables=[]; }

function render(){
  populateSections();
  destroySortables();
  const list=$("list"); list.innerHTML="";
  const bySec={}; items.forEach(i=>{ (bySec[i.section]=bySec[i.section]||[]).push(i); });
  let done=0,total=0;
  orderedSections().forEach(sec=>{
    const rows=bySec[sec]||[];
    const isPri=sec===PRIORITY;
    const el=document.createElement("section");
    if(isPri) el.className="pri";
    const open=rows.filter(i=>!i.done).length;
    const label=isPri?'⭐ High priority':esc(sec);
    el.innerHTML='<h2 class="'+(isPri?'pri':(SCHEDS.indexOf(sec)>=0?'sched':''))+'">'+label+'<span class="pill">'+open+' open</span></h2>';
    const ul=document.createElement("ul");
    ul.dataset.section=sec;
    if(!rows.length) ul.className="drop-empty";
    rows.forEach(i=>{
      total++; if(i.done)done++;
      const li=document.createElement("li");
      li.className=i.done?"done":"";
      li.dataset.id=i.id;
      li.innerHTML='<span class="grip" aria-hidden="true">&#9783;</span><span class="box"></span>'
        +'<span class="txt">'+esc(i.title)+(i.note?'<span class="note">'+esc(i.note)+'</span>':'')+'</span>';
      li.addEventListener("click",function(ev){ if(ev.target.classList.contains("grip")) return; toggle(i.id); });
      ul.appendChild(li);
    });
    el.appendChild(ul);
    if(isPri && !rows.length){ const h=document.createElement("p"); h.className="hint"; h.textContent="Drag items here to prioritize"; el.appendChild(h); }
    list.appendChild(el);
    if(window.Sortable){
      sortables.push(new Sortable(ul,{group:"todos",handle:".grip",animation:150,
        fallbackOnBody:true,swapThreshold:0.65,
        ghostClass:"sortable-ghost",chosenClass:"sortable-chosen",dragClass:"sortable-drag",
        onStart:function(){dragging=true;},
        onEnd:function(){dragging=false; handleDrop();}}));
    }
  });
  $("fill").style.width=(total?Math.round(done/total*100):0)+"%";
  $("count").textContent=done+" of "+total+" done";
}

async function persist(id,fields){
  busy++; status("saving","Saving…");
  try{
    const r=await fetch(REST+"?id=eq."+encodeURIComponent(id),{method:"PATCH",
      headers:{...H,"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify(fields)});
    if(!r.ok) throw new Error("HTTP "+r.status);
    busy--; if(!busy) status("ok","Saved");
  }catch(e){ busy--; status("err","Couldn't save — "+e.message); }
}

async function toggle(id){
  const it=items.find(x=>x.id===id); if(!it) return;
  pushUndo({type:"toggle", id, prevDone:it.done});
  it.done=!it.done; render();
  await persist(id,{done:it.done});
}

async function addItem(title, section){
  const t=(title||"").trim(); if(!t) return;
  const secItems=items.filter(i=>i.section===section);
  const maxIn=secItems.reduce((m,i)=>Math.max(m,i.position||0),0);
  const maxAll=items.reduce((m,i)=>Math.max(m,i.position||0),0);
  const pos=secItems.length?maxIn+1:(items.length?maxAll+10:10);
  const row={id:crypto.randomUUID(),list:LIST,section:section,title:t,note:null,position:pos,done:false};
  items.push(row); render(); $("addText").value=""; $("addText").focus();
  busy++; status("saving","Adding…");
  try{
    const r=await fetch(REST,{method:"POST",
      headers:{...H,"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify(row)});
    if(!r.ok) throw new Error("HTTP "+r.status);
    busy--; if(!busy) status("ok","Added");
  }catch(e){
    items=items.filter(x=>x.id!==row.id); render();
    busy--; status("err","Couldn't add — "+e.message);
  }
}

function handleDrop(){
  const prev={}; items.forEach(i=>prev[i.id]={section:i.section,position:i.position});
  const byId={}; items.forEach(i=>byId[i.id]=i);
  let pos=0; const changed=[];
  $("list").querySelectorAll("ul").forEach(ul=>{
    const sec=ul.dataset.section;
    ul.querySelectorAll("li").forEach(li=>{
      pos+=10; const id=li.dataset.id; const it=byId[id]; if(!it) return;
      if(it.section!==sec || it.position!==pos){ it.section=sec; it.position=pos; changed.push(id); }
    });
  });
  if(!changed.length) return;
  pushUndo({type:"move", changes:changed.map(id=>({id,section:prev[id].section,position:prev[id].position}))});
  render();
  changed.forEach(id=>persist(id,{section:byId[id].section,position:byId[id].position}));
}

async function undo(){
  const a=undoStack.pop(); setUndo();
  if(!a){ status("ok","Nothing to undo"); return; }
  status("saving","Undoing…");
  if(a.type==="toggle"){
    const it=items.find(x=>x.id===a.id); if(it){ it.done=a.prevDone; render(); await persist(a.id,{done:a.prevDone}); }
  }else if(a.type==="move"){
    a.changes.forEach(c=>{ const it=items.find(x=>x.id===c.id); if(it){ it.section=c.section; it.position=c.position; } });
    render();
    for(const c of a.changes){ await persist(c.id,{section:c.section,position:c.position}); }
  }
  if(!busy) status("ok","Undone");
}

const VKEY="view-hide-"+LIST;
function getHide(){ try{ return localStorage.getItem(VKEY)==="1"; }catch(e){ return false; } }
function setHide(h){ try{ localStorage.setItem(VKEY, h?"1":"0"); }catch(e){} }
function applyHide(){ const h=getHide(); $("list").classList.toggle("hide-done", h);
  $("toggleHide").textContent=h?"Show completed":"Hide completed"; }

$("toggleHide").onclick=function(){ setHide(!getHide()); applyHide(); };
$("refresh").onclick=load;
$("undo").onclick=undo;
$("addForm").addEventListener("submit",function(e){ e.preventDefault(); addItem($("addText").value,$("addSection").value); });
document.addEventListener("keydown",function(e){
  if((e.metaKey||e.ctrlKey) && (e.key==="z"||e.key==="Z") && !e.shiftKey){
    if(document.activeElement && document.activeElement.id==="addText") return;
    e.preventDefault(); undo();
  }
});
setUndo();
applyHide();
loadMeta();
load();
setInterval(load,12000);
window.addEventListener("focus",load);
</script>
</body>
</html>
